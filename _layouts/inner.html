---
layout: default
---

{% include base_path %}

<div class="inner-page">
  <div class="inner-page__header">
    <h1 class="inner-page__title">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="inner-page__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>

  <div class="inner-page__content">
    {{ content }}
  </div>
</div>
